# Publishes the package to npm when a GitHub Release is published.
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret is required.
# A Trusted Publisher must be configured on npmjs.com for this package:
#   org: InsidePics, repo: expo-apple-intelligence,
#   workflow filename: publish.yml, allowed action: npm publish.
# Build provenance is generated automatically for a public repo + public package.
name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write # required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Node 22 ships an older npm; OIDC trusted publishing needs npm >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --access public
